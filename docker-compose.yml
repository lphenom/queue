services:
  php:
    image: php:8.1.31-alpine3.20
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: queue_test
      DB_USER: queue
      DB_PASS: queue_secret
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    command: ["php", "-v"]

  composer:
    image: composer:2.9.5
    working_dir: /app
    volumes:
      - .:/app
    entrypoint: ["composer"]

  mysql:
    image: mysql:8.0.40
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: queue_test
      MYSQL_USER: queue
      MYSQL_PASSWORD: queue_secret
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "queue", "-pqueue_secret"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10


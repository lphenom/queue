name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, mbstring, zip
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Run lint (php-cs-fixer)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes

      - name: Run static analysis (phpstan)
        run: vendor/bin/phpstan analyse --memory-limit=256M

      - name: Run unit tests (phpunit)
        run: vendor/bin/phpunit --colors=always

  kphp-check:
    name: KPHP binary + PHAR check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: pdo, mbstring, zip

      - name: Install production dependencies (for Docker build context)
        run: composer install --no-dev --no-progress --prefer-dist --optimize-autoloader

      - name: Build KPHP binary + PHAR (Dockerfile.check)
        run: docker build -f Dockerfile.check -t lphenom-queue-check .


